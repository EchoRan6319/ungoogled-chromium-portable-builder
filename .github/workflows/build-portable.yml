name: Build Portable Ungoogled Chromium

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture (or "all" for all architectures)'
        required: true
        default: x64
        type: choice
        options:
          - x64
          - x86
          - arm64
          - all
      publish_release:
        description: Publish a GitHub release
        required: true
        default: true
        type: boolean
      force_build:
        description: Build even if the same upstream versions were already published
        required: true
        default: false
        type: boolean
      runner_labels:
        description: JSON array for runs-on, for example ["windows-latest"] or ["self-hosted","Windows","X64"]
        required: true
        default: '["windows-latest"]'
        type: string
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      runner_labels: ${{ steps.set-runner.outputs.runner_labels }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [ "$EVENT_NAME" = "schedule" ] || [ "$ARCH" = "all" ]; then
            echo 'matrix=["x64","x86","arm64"]' >> "$GITHUB_OUTPUT"
          else
            echo "matrix=[\"$ARCH\"]" >> "$GITHUB_OUTPUT"
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          ARCH: ${{ inputs.arch || 'x64' }}

      - name: Set runner labels
        id: set-runner
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "runner_labels=$RUNNER_LABELS" >> "$GITHUB_OUTPUT"
          elif [ -n "$PORTABLE_RUNNER_LABELS" ]; then
            echo "runner_labels=$PORTABLE_RUNNER_LABELS" >> "$GITHUB_OUTPUT"
          else
            echo 'runner_labels=["windows-latest"]' >> "$GITHUB_OUTPUT"
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUNNER_LABELS: ${{ inputs.runner_labels }}
          PORTABLE_RUNNER_LABELS: ${{ vars.PORTABLE_RUNNER_LABELS }} # actionlint-ignore

  build:
    needs: prepare
    runs-on: ${{ fromJson(needs.prepare.outputs.runner_labels) }}
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(needs.prepare.outputs.matrix) }}
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve build plan
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_FORCE_BUILD: ${{ inputs.force_build }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $ErrorActionPreference = 'Stop'
          $arch = '${{ matrix.arch }}'
          $forceBuild = $false
          if ($env:EVENT_NAME -eq 'workflow_dispatch') {
            $forceBuild = [System.Convert]::ToBoolean($env:INPUT_FORCE_BUILD)
          }

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
          }

          $ungoogled = Invoke-RestMethod 'https://api.github.com/repos/ungoogled-software/ungoogled-chromium-windows/releases/latest' -Headers $headers
          $chromePlus = Invoke-RestMethod 'https://api.github.com/repos/Bush2021/chrome_plus/releases/latest' -Headers $headers

          $releaseTag = "$($ungoogled.tag_name)-$($chromePlus.tag_name)"
          $assetBaseName = "ungoogled-chromium-portable-$arch-$($ungoogled.tag_name)"

          $releaseExists = $false
          $assetExists = $false
          try {
            $uri = "https://api.github.com/repos/$($env:REPOSITORY)/releases/tags/$releaseTag"
            $release = Invoke-RestMethod -Uri $uri -Headers $headers
            $releaseExists = $true
            $expectedArchiveName = "$assetBaseName.7z"
            $assetExists = [bool]($release.assets | Where-Object { $_.name -eq $expectedArchiveName })
          }
          catch {
            if ($_.Exception.Response.StatusCode.value__ -ne 404) {
              throw
            }
          }

          $shouldBuild = $forceBuild -or -not $assetExists

          "arch=$arch" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "asset_base_name=$assetBaseName" >> $env:GITHUB_OUTPUT
          "ungoogled_tag=$($ungoogled.tag_name)" >> $env:GITHUB_OUTPUT
          "chrome_plus_tag=$($chromePlus.tag_name)" >> $env:GITHUB_OUTPUT
          "should_build=$($shouldBuild.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "release_exists=$($releaseExists.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Stop when release already exists
        if: steps.plan.outputs.should_build != 'true'
        run: |
          Write-Host "Asset for ${{ steps.plan.outputs.arch }} already exists in release ${{ steps.plan.outputs.release_tag }}. Skipping build."

      - name: Build portable package
        if: steps.plan.outputs.should_build == 'true'
        run: |
          .\build-portable.ps1 -Arch '${{ steps.plan.outputs.arch }}' -Force

      - name: Collect build outputs
        if: steps.plan.outputs.should_build == 'true'
        id: collect
        run: |
          $ErrorActionPreference = 'Stop'
          $metadataPath = Join-Path $PWD 'artifacts/ungoogled-chromium-portable-${{ steps.plan.outputs.arch }}/metadata.json'
          if (-not (Test-Path -LiteralPath $metadataPath)) {
            throw "metadata.json not found at $metadataPath"
          }

          $metadata = Get-Content -LiteralPath $metadataPath -Raw | ConvertFrom-Json
          $expectedArchive = "${{ steps.plan.outputs.asset_base_name }}.7z"
          $archive = Get-ChildItem -LiteralPath (Join-Path $PWD 'artifacts') -Filter $expectedArchive -File | Select-Object -First 1
          if (-not $archive) {
            throw 'Packed .7z artifact not found'
          }

          $portableDir = Split-Path -Parent $metadataPath

          "metadata_path=$metadataPath" >> $env:GITHUB_OUTPUT
          "portable_dir=$portableDir" >> $env:GITHUB_OUTPUT
          "archive_path=$($archive.FullName)" >> $env:GITHUB_OUTPUT

          @"
          ### ${{ steps.plan.outputs.arch }}

          - Ungoogled Chromium: $($metadata.ungoogled.tag)
          - Chrome++: $($metadata.chrome_plus.tag)
          "@ | Set-Content -LiteralPath release-notes.md -Encoding UTF8

      - name: Upload workflow artifact
        if: steps.plan.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.plan.outputs.asset_base_name }}
          path: |
            ${{ steps.collect.outputs.archive_path }}
            ${{ steps.collect.outputs.metadata_path }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: steps.plan.outputs.should_build == 'true' && (github.event_name != 'workflow_dispatch' || inputs.publish_release == true)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.plan.outputs.release_tag }}
          name: ${{ steps.plan.outputs.release_tag }}
          files: |
            ${{ steps.collect.outputs.archive_path }}

  publish:
    needs: [prepare, build]
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Download all metadata artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: ungoogled-chromium-portable-*
          path: all-artifacts
          merge-multiple: false

      - name: Merge metadata and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          # Find all metadata.json files and merge them
          merged='[]'
          release_tag=''

          while IFS= read -r -d '' metadata_file; do
            if [ -z "$release_tag" ]; then
              ungoogled_tag=$(jq -r '.ungoogled.tag' "$metadata_file")
              chrome_plus_tag=$(jq -r '.chrome_plus.tag' "$metadata_file")
              release_tag="${ungoogled_tag}-${chrome_plus_tag}"
            fi
            merged=$(echo "$merged" | jq --slurpfile entry "$metadata_file" '. + $entry')
          done < <(find all-artifacts -name 'metadata.json' -type f -print0 | sort -z)

          if [ "$merged" = "[]" ]; then
            echo "No metadata files found, skipping release update"
            exit 0
          fi

          # Sort merged entries by arch for deterministic output
          merged=$(echo "$merged" | jq 'sort_by(.arch)')

          # Write merged metadata as metadata.json
          echo "$merged" | jq '.' > metadata.json
          echo "Merged metadata:"
          cat metadata.json

          # Upload all archives (clobber in case they already exist from individual build jobs)
          while IFS= read -r -d '' archive; do
            echo "Uploading $archive..."
            gh release upload "$release_tag" "$archive" \
              --repo "${{ github.repository }}" \
              --clobber
          done < <(find all-artifacts -name '*.7z' -type f -print0)

          # Upload merged metadata.json (overwrites individual ones)
          echo "Uploading merged metadata.json..."
          gh release upload "$release_tag" metadata.json \
            --repo "${{ github.repository }}" \
            --clobber

          # Update release body with complete notes for all architectures
          # Generate release notes from merged metadata using jq
          echo "$merged" | jq -r '
            reduce .[] as $entry (""; 
              if . == "" then . else . + "\n\n" end 
              + "### " + $entry.arch + "\n\n- Ungoogled Chromium: " + $entry.ungoogled.tag + "\n- Chrome++: " + $entry.chrome_plus.tag
            )
          ' > release-notes.md
          echo "Release notes:"
          cat release-notes.md
          gh release edit "$release_tag" \
            --repo "${{ github.repository }}" \
            --notes-file release-notes.md
